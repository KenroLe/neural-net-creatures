<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Neural Net Creatures</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0c0c16;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: monospace;
            color: #ccc;
        }
        h1 {
            margin-bottom: 12px;
            font-size: 1.1rem;
            letter-spacing: 0.05em;
            color: #8af;
        }
        #status {
            margin-bottom: 10px;
            font-size: 0.85rem;
            color: #888;
        }
        canvas {
            display: block;
            border: 1px solid #2a2a3a;
        }
        p.hint {
            margin-top: 10px;
            font-size: 0.75rem;
            color: #555;
        }
    </style>
</head>
<body>
    <h1>Neural Net Creatures</h1>
    <div id="status">Loading...</div>
    <script src="wasm_exec.js"></script>
    <script>
        if (!WebAssembly.instantiateStreaming) {
            WebAssembly.instantiateStreaming = async (resp, importObject) => {
                const source = await (await resp).arrayBuffer();
                return await WebAssembly.instantiate(source, importObject);
            };
        }

        const go = new Go();
        WebAssembly.instantiateStreaming(fetch('neural-nets.wasm'), go.importObject)
            .then(result => {
                document.getElementById('status').textContent = 'Running';
                go.run(result.instance);
            })
            .catch(err => {
                document.getElementById('status').textContent = 'Failed to load: ' + err;
                console.error(err);
            });
    </script>
    <p class="hint">[P] pause &nbsp; [+/-] speed &nbsp; [WASD] camera &nbsp; click creature to inspect</p>
</body>
</html>
